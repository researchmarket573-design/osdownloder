<style>
:root {
  --brand-green: #0B4D3B;
}

* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--brand-green);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 70px;
  color: #ffffff;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  text-align: center;
}

/* 🔥 Logo close to heading */
.logo-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 4px;   /* Very tight spacing */
}

.logo-img {
  width: 220px;
  max-width: 85%;
}

h1 {
  font-size: 24px;
  font-weight: 600;
  margin-top: 0;
  margin-bottom: 4px;  /* Tight spacing */
}

.subtext {
  font-size: 14px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 28px;
}

.store-link {
  display: none;
  align-items: center;
  justify-content: center;
  height: 56px;
  border-radius: 14px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  color: #0B4D3B;
  background: #ffffff;
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  transition: 0.2s ease;
  margin-bottom: 16px;
}

.store-link:hover {
  transform: translateY(-2px);
}

.store-link:active {
  transform: scale(0.96);
}

.footer {
  margin-top: 24px;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
}
</style>

<body>

<div class="container">

  <div class="logo-wrapper">
    <img src="https://firebasestorage.googleapis.com/v0/b/my-dream-project-30a0d.firebasestorage.app/o/Untitled%20design.png?alt=media&token=9fc05198-ed93-4cdf-8de7-bab5578fb67b"
         alt="HYZR Logo"
         class="logo-img">
  </div>

  <h1>Install Our Hyzr App</h1>
  <div class="subtext">Hailing Your Zonal Rides.</div>

  <a id="iosBtn" class="store-link"
     href="https://apps.apple.com/in/app/hyzr/id6740561889"
     onclick="trackAndRedirect(event, this.href)">
     Download on the App Store
  </a>

  <a id="androidBtn" class="store-link"
     href="https://play.google.com/store/apps/details?id=com.hyzr.hyzr.app"
     onclick="trackAndRedirect(event, this.href)">
     Get it on Google Play
  </a>

  <a id="otherBtn" class="store-link"
     href="https://play.google.com/store/apps/details?id=com.hyzr.hyzr.app"
     onclick="trackAndRedirect(event, this.href)">
     Download
  </a>

  <div class="footer">HYZR | Beyond Mobility</div>

</div>

<script>
(function detectOS() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;

  if (/android/i.test(ua)) {
    document.getElementById('androidBtn').style.display = 'flex';
  } 
  else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
    document.getElementById('iosBtn').style.display = 'flex';
  } 
  else {
    document.getElementById('otherBtn').style.display = 'flex';
  }
})();

function trackAndRedirect(event, url) {
  event.preventDefault();
  fbq('trackCustom', 'StoreClick');
  setTimeout(function() {
    window.location.href = url;
  }, 400);
}
</script>

</body>
